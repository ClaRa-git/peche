networks:
  webg:
    driver: bridge
volumes:
  dbgraildata:

services:

  # service de bdd
  postgresgrails:
    image: postgres:16
    container_name: pg7
    ports:
      - 5438:5432
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - dbgraildata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks: [ webg ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  grails_service:
    container_name: gserv
    build:
      context: ./gDockerFile
    volumes:
      - ./app:/app
      #- ./sdkG:/root/.sdkman/candidates/grails/current
    environment:
      - POSTGRES_HOST=postgresgrails
      - POSTGRES_PORT=5432
      - POSTGRES_DB=cfadb
      - POSTGRES_USER=cfa
      - POSTGRES_PASSWORD=cfa2025
      - JAVA_OPTS=-Xmx512m -Xms256m
    ports:
      - "8088:8080"
    depends_on:
      postgresgrails:
        condition: service_healthy
    networks: [webg]
    tty: true