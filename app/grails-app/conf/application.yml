---
grails:
    profile: web
    codegen:
        defaultPackage: app
    gorm:
        reactor:
            # Whether to translate GORM events into Reactor events
            # Disabled by default for performance reasons
            events: false
    plugin:
        springsecurity:
            userLookup:
                userDomainClassName: app.AppUser
                usernamePropertyName: email
                passwordPropertyName: passwordHash
            rest:
                token:
                    storage:
                        jwt:
                            secret: 'peche3000_secret_jwt_key_must_be_long_enough_32chars'
            controllerAnnotations:
                staticRules:
                    - pattern: '/api/auth/**'
                      access: [ 'permitAll' ]
                    - pattern: '/api/admin/**'
                      access: [ 'ROLE_ADMIN' ]
                    - pattern: '/api/**'
                      access: [ 'isAuthenticated()' ]
                    - pattern: '/**'
                      access: [ 'permitAll' ]
info:
    app:
        name: '@info.app.name@'
        version: '@info.app.version@'
        grailsVersion: '@info.app.grailsVersion@'
spring:
    jmx:
        unique-names: true
    main:
        banner-mode: "console"
    groovy:
        template:
            check-template-location: false
    devtools:
        restart:
            additional-exclude:
                - '*.gsp'
                - '**/*.gsp'
                - '*.gson'
                - '**/*.gson'
                - 'logback-spring.xml'
                - '*.properties'
environments:
    development:
        management:
            endpoints:
                enabled-by-default: true
                web:
                    base-path: '/actuator'
                    exposure:
                        include: '*'
    production:
        management:
            endpoints:
                enabled-by-default: false

---
grails:
    mime:
        disable:
            accept:
                header:
                    userAgents:
                        - Gecko
                        - WebKit
                        - Presto
                        - Trident
        types:
            all: '*/*'
            atom: application/atom+xml
            css: text/css
            csv: text/csv
            form: application/x-www-form-urlencoded
            html:
              - text/html
              - application/xhtml+xml
            js: text/javascript
            json:
              - application/json
              - text/json
            multipartForm: multipart/form-data
            pdf: application/pdf
            rss: application/rss+xml
            text: text/plain
            hal:
              - application/hal+json
              - application/hal+xml
            xml:
              - text/xml
              - application/xml
    urlmapping:
        cache:
            maxsize: 1000
    controllers:
        defaultScope: singleton
    converters:
        encoding: UTF-8
    views:
        default:
            codec: html
        gsp:
            encoding: UTF-8
            htmlcodec: xml
            codecs:
                expression: html
                scriptlet: html
                taglib: none
                staticparts: none

---
hibernate:
    cache:
        queries: false
        use_second_level_cache: false
        use_query_cache: false
dataSource:
    pooled: true
    url: jdbc:postgresql://postgresgrails:5432/cfadb
    jmxExport: true
    driverClassName: org.postgresql.Driver
    username: cfa
    password: cfa2025
    dialect: org.hibernate.dialect.PostgreSQLDialect

environments:
    development:
        dataSource:
            dbCreate: none
            logSql: true
            formatSql: true
            url: jdbc:postgresql://postgresgrails:5432/cfadb
    logging:
        level:
            org.springframework.security: DEBUG
            grails.plugin.springsecurity: DEBUG
    test:
        dataSource:
            dbCreate: update
            url: jdbc:postgresql://postgresgrails:5432/cfadb
    production:
        dataSource:
            dbCreate: none
            url: jdbc:postgresql://postgresgrails:5432/cfadb
            properties:
                jmxEnabled: true
                initialSize: 5
                maxActive: 50
                minIdle: 5
                maxIdle: 25
                maxWait: 10000
                maxAge: 600000
                timeBetweenEvictionRunsMillis: 5000
                minEvictableIdleTimeMillis: 60000
                validationQuery: SELECT 1
                validationQueryTimeout: 3
                validationInterval: 15000
                testOnBorrow: true
                testWhileIdle: true
                testOnReturn: false
                jdbcInterceptors: ConnectionState
                defaultTransactionIsolation: 2 # TRANSACTION_READ_COMMITTED

---
# Added by the Spring Security Core plugin:
grails:
    plugin:
        springsecurity:
            userLookup:
                userDomainClassName: 'app.AppUser'
                authorityJoinClassName: 'app.AppUserRole'
        authority:
            className: 'app.Role'
            controllerAnnotations:
                staticRules:
                    - pattern: /
                      access: ['permitAll']
                    - pattern: /error
                      access: ['permitAll']
                    - pattern: /index
                      access: ['permitAll']
                    - pattern: /index.gsp
                      access: ['permitAll']
                    - pattern: /shutdown
                      access: ['permitAll']
                    - pattern: /assets/**
                      access: ['permitAll']
                    - pattern: /**/js/**
                      access: ['permitAll']
                    - pattern: /**/css/**
                      access: ['permitAll']
                    - pattern: /**/images/**
                      access: ['permitAll']
                    - pattern: /**/favicon.ico
                      access: ['permitAll']

            filterChain:
                chainMap:
                    - pattern: /assets/**
                      filters: none
                    - pattern: /**/js/**
                      filters: none
                    - pattern: /**/css/**
                      filters: none
                    - pattern: /**/images/**
                      filters: none
                    - pattern: /**/favicon.ico
                      filters: none
                    - pattern: /**
                      filters: JOINED_FILTERS

